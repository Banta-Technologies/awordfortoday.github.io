    * {
      box-sizing: border-box;

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #f9f6f0 0%, #f2ece2 100%);

      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);

      padding: 48px 32px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #f2eadf;
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
